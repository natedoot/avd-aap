---
all:
  children:
    PARIS:
      vars:
        ansible_httpapi_use_ssl: true
        ansible_httpapi_validate_certs: true
      children:
        DC1:
          children:
            DC1_SPINES:
              vars:
                type: spine
              hosts:
                dc1-spine1:
                  ansible_host: 192.168.0.10
                dc1-spine2:
                  ansible_host: 192.168.0.11
            DC1_L3_LEAVES:
              vars:
                type: l3leaf
              hosts:
                dc1-leaf1a:
                  ansible_host: 192.168.0.12
                dc1-leaf1b:
                  ansible_host: 192.168.0.13
                dc1-leaf2a:
                  ansible_host: 192.168.0.14
                dc1-leaf2b:
                  ansible_host: 192.168.0.15
    NETWORK_SERVICES:
      children:
        DC1_L3_LEAVES:
    CONNECTED_ENDPOINTS:
      children:
        DC1_L3_LEAVES:
