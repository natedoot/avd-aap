aaa_authorization:
  exec:
    default: local
aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet3
  description: MLAG_dc1-leaf1b_Ethernet3
  shutdown: false
  channel_group:
    id: 3
    mode: active
  peer: dc1-leaf1b
  peer_interface: Ethernet3
  peer_type: mlag_peer
- name: Ethernet1
  description: P2P_dc1-spine1_Ethernet1
  shutdown: false
  mtu: 1500
  ip_address: 1.1.255.1/31
  peer: dc1-spine1
  peer_interface: Ethernet1
  peer_type: spine
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_dc1-spine2_Ethernet1
  shutdown: false
  mtu: 1500
  ip_address: 1.1.255.3/31
  peer: dc1-spine2
  peer_interface: Ethernet1
  peer_type: spine
  switchport:
    enabled: false
- name: Ethernet4
  description: SERVER_dc1-leaf1-server1_PCI1
  shutdown: false
  channel_group:
    id: 4
    mode: active
  peer: dc1-leaf1-server1
  peer_interface: PCI1
  peer_type: server
hostname: dc1-leaf1a
ip_igmp_snooping:
  globally_enabled: true
ip_name_servers:
- ip_address: 169.254.169.254
  vrf: default
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:00:99
is_deployed: true
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$uvAdkfgXMogaI31a$s2pkc9g5uzKUfOCDEx8YAuAcNCnY.IiF/W3IBMW9o4rTlHF1KxDeTgNUmGAqxI2hFHXMvlrOrZdfP8KPMoHa3.
- name: cvpadmin
  privilege: 15
  role: network-admin
  sha512_password: $6$JIWpYntS5KpTMCGF$el6rGKnDYPqxKeMcJGutPctkOMiHrV/bej1DTmdTR8jEnuV/gQbTYa76slNHP1vwyN8Gq2kbNsMmXUwVhkwjy1
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 1.1.0.3/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 1.1.1.3/32
- name: Loopback10
  description: DIAG_VRF_VRF10
  shutdown: false
  vrf: VRF10
  ip_address: 10.255.10.3/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: default
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.103/24
  type: oob
metadata:
  platform: vEOS-LAB
  fabric_name: DC1_FABRIC
mlag_configuration:
  domain_id: DC1_L3_LEAF1
  local_interface: Vlan4094
  peer_address: 1.1.1.65
  peer_link: Port-Channel3
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
ntp:
  local_interface:
    name: Management1
    vrf: default
  servers:
  - name: pool.ntp.org
    iburst: true
    preferred: true
    vrf: default
port_channel_interfaces:
- name: Port-Channel3
  description: MLAG_dc1-leaf1b_Port-Channel3
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel4
  description: SERVER_dc1-leaf1-server1_Bond1
  shutdown: false
  mlag: 4
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 11-12,21-22
      native_vlan: 4092
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 1.1.0.0/27 eq 32
  - sequence: 20
    action: permit 1.1.1.0/27 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 1.1.1.96/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65101'
  router_id: 1.1.0.3
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65101'
    description: dc1-leaf1b
    next_hop_self: true
    send_community: all
    maximum_routes: 12000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 1.1.1.97
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: dc1-leaf1b
    description: dc1-leaf1b_Vlan4093
  - ip_address: 1.1.255.0
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    peer: dc1-spine1
    description: dc1-spine1_Ethernet1
  - ip_address: 1.1.255.2
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    peer: dc1-spine2
    description: dc1-spine2_Ethernet1
  - ip_address: 1.1.0.1
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    peer: dc1-spine1
    description: dc1-spine1_Loopback0
  - ip_address: 1.1.0.2
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    peer: dc1-spine2
    description: dc1-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 11
    tenant: TENANT1
    rd: 1.1.0.3:10011
    route_targets:
      both:
      - 10011:10011
    redistribute_routes:
    - learned
  - id: 12
    tenant: TENANT1
    rd: 1.1.0.3:10012
    route_targets:
      both:
      - 10012:10012
    redistribute_routes:
    - learned
  - id: 3401
    tenant: TENANT1
    rd: 1.1.0.3:13401
    route_targets:
      both:
      - 13401:13401
    redistribute_routes:
    - learned
  - id: 3402
    tenant: TENANT1
    rd: 1.1.0.3:13402
    route_targets:
      both:
      - 13402:13402
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: VRF10
    rd: 1.1.0.3:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
    router_id: 1.1.0.3
    updates:
      wait_install: true
    neighbors:
    - ip_address: 1.1.1.97
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: dc1-leaf1b_Vlan3009
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 4096
  no_spanning_tree_vlan: 4093-4094
transceiver_qsfp_default_mode_4x10: true
virtual_source_nat_vrfs:
- name: VRF10
  ip_address: 10.255.10.3
vlan_interfaces:
