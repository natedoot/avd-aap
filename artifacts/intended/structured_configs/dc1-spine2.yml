aaa_authorization:
  exec:
    default: local
aaa_root:
  disabled: true
clock:
  timezone: Europe/Paris
config_end: true
daemon_terminattr:
  cvaddrs:
  - apiserver.arista.io:443
  cvauth:
    method: certs
    cert_file: /persist/secure/ssl/terminattr/primary/certs/client.crt
    key_file: /persist/secure/ssl/terminattr/primary/keys/client.key
  cvvrf: MGMT
  smashexcludes: ale,flexCounter,hardware,kni,pulse,strata
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1/1
  description: P2P_dc1-leaf1a_Ethernet50/1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.255.2/31
  peer: dc1-leaf1a
  peer_interface: Ethernet50/1
  peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet2/1
  description: P2P_dc1-leaf1b_Ethernet50/1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.255.6/31
  peer: dc1-leaf1b
  peer_interface: Ethernet50/1
  peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet3/1
  description: P2P_dc1-leaf2a_Ethernet50/1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.255.10/31
  peer: dc1-leaf2a
  peer_interface: Ethernet50/1
  peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet4/1
  description: P2P_dc1-leaf2b_Ethernet50/1
  shutdown: false
  mtu: 1500
  ip_address: 10.255.255.14/31
  peer: dc1-leaf2b
  peer_interface: Ethernet50/1
  peer_type: l3leaf
  switchport:
    enabled: false
hostname: dc1-spine2
ip_name_servers:
- ip_address: 1.1.1.1
  vrf: MGMT
ip_routing: true
is_deployed: true
local_users:
- name: ansible
  privilege: 15
  role: network-admin
  sha512_password: $6$ZGwJJdGz2X/bihyP$nqB/UKt2n3GBaeZS2/gMHTvIk2NjhJ3rk2/Sge.OBOvCgCNXSx7qmMg.HolGCMTcuM.qZjJXJx9FUwgmuoJAl0
- name: mtache
  privilege: 15
  role: network-admin
  sha512_password: $6$ZGwJJdGz2X/bihyP$nqB/UKt2n3GBaeZS2/gMHTvIk2NjhJ3rk2/Sge.OBOvCgCNXSx7qmMg.HolGCMTcuM.qZjJXJx9FUwgmuoJAl0
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.2/32
management_api_http:
  enable_https: true
  default_services: false
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 192.168.0.11/24
  type: oob
  gateway: 172.20.1.1
metadata:
  platform: cEOSLab
  fabric_name: PARIS
ntp:
  local_interface:
    name: Management1
    vrf: MGMT
  servers:
  - name: 0.pool.ntp.org
    preferred: true
    vrf: MGMT
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/27 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65100'
  router_id: 10.255.0.2
  maximum_paths:
    paths: 4
    ecmp: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.255.3
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65101'
    peer: dc1-leaf1a
    description: dc1-leaf1a_Ethernet50/1
  - ip_address: 10.255.255.7
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65101'
    peer: dc1-leaf1b
    description: dc1-leaf1b_Ethernet50/1
  - ip_address: 10.255.255.11
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65102'
    peer: dc1-leaf2a
    description: dc1-leaf2a_Ethernet50/1
  - ip_address: 10.255.255.15
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65102'
    peer: dc1-leaf2b
    description: dc1-leaf2b_Ethernet50/1
  - ip_address: 10.255.0.3
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    peer: dc1-leaf1a
    description: dc1-leaf1a_Loopback0
  - ip_address: 10.255.0.4
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    peer: dc1-leaf1b
    description: dc1-leaf1b_Loopback0
  - ip_address: 10.255.0.5
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65102'
    peer: dc1-leaf2a
    description: dc1-leaf2a_Loopback0
  - ip_address: 10.255.0.6
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65102'
    peer: dc1-leaf2b
    description: dc1-leaf2b_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
serial_number: MTACHEDATACENTER002
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: none
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.20.1.1
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: MGMT
  ip_routing: false
