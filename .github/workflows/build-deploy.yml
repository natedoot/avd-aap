name: Build and Deploy EOS Configuration using Ansible Automation Platform

on:
  push:
    branches:
      - main
    paths:
      - 'group_vars/**'
      - 'playbooks/build-deploy.yml'

jobs:
  launch-job-template:
    runs-on: ubuntu-latest
    steps:
    - name: Send signed GitHub-style webhook to AAP
      env:
        AAP_WEBHOOK_URL: ${{ secrets.AAP_WEBHOOK_URL }}
        AAP_WEBHOOK_SECRET: ${{ secrets.AAP_WEBHOOK_SECRET }}
      run: |
        set -euo pipefail

        payload_file="$GITHUB_EVENT_PATH"
        delivery_id="$(uuidgen | tr '[:upper:]' '[:lower:]')"

        echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
        echo "GITHUB_EVENT_PATH=$GITHUB_EVENT_PATH"

        test -n "$payload_file"
        test -f "$payload_file"

        signature_hex="$(openssl dgst -sha256 -hmac "$AAP_WEBHOOK_SECRET" "$payload_file" | sed 's/^.*= //')"
        signature="sha256=${signature_hex}"

        http_code="$(
          curl -sS -o /tmp/aap_webhook_response.txt -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: $GITHUB_EVENT_NAME" \
            -H "X-GitHub-Delivery: $delivery_id" \
            -H "X-Hub-Signature-256: $signature" \
            --data-binary @"$payload_file" \
            "$AAP_WEBHOOK_URL"
        )"

        echo "AAP returned HTTP $http_code"
        cat /tmp/aap_webhook_response.txt

        test "$http_code" -ge 200
        test "$http_code" -lt 300
