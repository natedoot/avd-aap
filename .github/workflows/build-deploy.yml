name: Build and Deploy EOS Configuration using Ansible Automation Platform

on:
  push:
    branches:
      - main
    paths:
      - 'group_vars/**'
      - 'playbooks/build-deploy.yml'

jobs:
  launch-job-template:
    runs-on: ubuntu-latest
    steps:
    - name: Launch Job Template
      uses: fjogeleit/http-request-action@v1
      with:
        url: 'https://sandbox-aap-nate-shaw-dev.apps.rm1.0a51.p1.openshiftapps.com/api/controller/v2/job_templates/10/github/'
        method: 'POST'
        bearerToken: ${{ secrets.AAP_TOKEN }}
        # username: ${{ secrets.AAP_USER }}
        # password: ${{ secrets.AAP_PASSWORD }}
        customHeaders: '{"Content-Type": "application/json"}'
        ignoreSsl: true
