---

# Common AVD group variables
fabric_name: DC1_FABRIC

# Define underlay and overlay routing protocol to be used
underlay_routing_protocol: ebgp
overlay_routing_protocol: ebgp

name_servers:
  - 169.254.169.254

ntp_settings:
  servers:
    - name: pool.ntp.org
      iburst: True

p2p_uplinks_mtu: 1500

# Set default uplink, downlink, and MLAG interfaces based on node type
default_interfaces:
  - types: [ spine ]
    platforms: [ vEOS-LAB ]
    uplink_interfaces: [ Ethernet1-2 ]
    downlink_interfaces: [ Ethernet1-8 ]
  - types: [ l3leaf ]
    platforms: [ vEOS-LAB ]
    uplink_interfaces: [ Ethernet1-2 ]
    mlag_interfaces: [ Ethernet3 ]
    downlink_interfaces: [ Ethernet4 ]

# CloudVision Portal definitions
cv_settings:
  cvaas:
    enabled: true
    clusters:
      - name: prod
        region: us-central1-b
        vrf: default
  terminattr:

    # Disable AAA authorization and accounting.
    # When setting this flag, all commands pushed from CloudVision are applied directly to the CLI without authorization.
    disable_aaa: true

custom_structured_configuration_aaa_authorization:
  exec:
    default: local

mgmt_interface_vrf: default

local_users: 
  - name: admin
    privilege: 15
    role: network-admin
    sha512_password: $6$uvAdkfgXMogaI31a$s2pkc9g5uzKUfOCDEx8YAuAcNCnY.IiF/W3IBMW9o4rTlHF1KxDeTgNUmGAqxI2hFHXMvlrOrZdfP8KPMoHa3.
  - name: cvpadmin
    privilege: 15
    role: network-admin
    sha512_password: $6$JIWpYntS5KpTMCGF$el6rGKnDYPqxKeMcJGutPctkOMiHrV/bej1DTmdTR8jEnuV/gQbTYa76slNHP1vwyN8Gq2kbNsMmXUwVhkwjy1

network_services_keys: # default=[{'name': 'tenants'}]
  - name: tenants
  
custom_connected_endpoints_keys:
  - key: servers

    # Type used for documentation.
    type: servers
